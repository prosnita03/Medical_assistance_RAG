version: "3.9"

services:
  medassist:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma_db
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # Persist ChromaDB data across container restarts
      - chroma_data:/app/backend/data/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
    driver: local
